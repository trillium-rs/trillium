[package]
name = "trillium-openssl"
version = "0.1.0"
authors = ["Jacob Rothstein <hi@jbr.me>"]
edition = "2024"
description = "openssl adapter for trillium.rs"
license = "MIT OR Apache-2.0"
repository = "https://github.com/trillium-rs/trillium"
readme = "README.md"
keywords = ["trillium", "framework", "async"]
categories = ["web-programming::http-server", "web-programming"]

[features]
vendored = ["openssl/vendored"]

[dependencies]
async-openssl = "0.2.2"
openssl = "0.10.72"
trillium-server-common = { path = "../server-common", version = "0.6.0" }

[dev-dependencies]
env_logger = "0.11.10"
portpicker = "0.1.1"
test-harness = "0.3.1"
trillium = { path = "../trillium" }
trillium-client = { path = "../client" }
trillium-native-tls = { path = "../native-tls" }
trillium-rustls = { path = "../rustls" }
trillium-smol = { path = "../smol" }
trillium-testing = { path = "../testing" }
