[package]
name = "trillium-smol"
version = "0.5.0-rc.1"
authors = ["Jacob Rothstein <hi@jbr.me>"]
edition = "2024"
description = "smol runtime adapter for trillium.rs"
license = "MIT OR Apache-2.0"
repository = "https://github.com/trillium-rs/trillium"
readme = "README.md"
keywords = ["trillium", "framework", "async"]
categories = ["web-programming::http-server", "web-programming"]

[dependencies]
async-global-executor = {version = "3.1.0", features = ["async-io"] }
async-io = "2.6.0"
async-net = "2.0.0"
async-task = "4.7.1"
futures-lite = "2.6.1"
log = "0.4.29"
trillium = { path = "../trillium", version = "1.0.0-rc.1" }
trillium-http = { path = "../http", version = "1.0.0-rc.1" }
trillium-macros = { version = "0.1.0-rc.1", path = "../macros" }
trillium-server-common = { path = "../server-common", version = "0.6.0-rc.1" }

[target.'cfg(unix)'.dependencies]
signal-hook = "0.4.3"
async-signal = "0.2.13"

[dev-dependencies]
env_logger = "0.11.10"
tempfile = "3.27.0"
test-harness = "0.3.1"
trillium-client = { path = "../client" }
trillium-logger = { path = "../logger" }
trillium-testing = { path = "../testing" }

[[example]]
name = "smol"
test = true

[package.metadata.cargo-udeps.ignore]
development = ["trillium-testing", "trillium-client"]
