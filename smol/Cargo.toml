[package]
name = "trillium-smol"
version = "0.6.4"
authors = ["Jacob Rothstein <hi@jbr.me>"]
edition = "2024"
description = "smol runtime adapter for trillium.rs"
license = "MIT OR Apache-2.0"
repository = "https://github.com/trillium-rs/trillium"
readme = "README.md"
keywords = ["trillium", "framework", "async"]
categories = ["web-programming::http-server", "web-programming"]

[features]
# SO_REUSEPORT thread-per-core fan-out entrypoint (Unix only). Enables the `FanOut` impl for
# `SmolRuntime` and forwards to server-common's `reuseport` feature, which exposes
# `ListenerConfig::bind_reuseport_*` and pulls in socket2.
reuseport = ["trillium-server-common/reuseport"]

[dependencies]
async-executor = "1.14.0"
async-global-executor = {version = "3.1.0", features = ["async-io"] }
async-io = "2.6.0"
async-net = "2.0.0"
async-task = "4.7.1"
futures-lite = "2.6.1"
log = "0.4.29"
trillium.workspace = true
trillium-http.workspace = true
trillium-macros.workspace = true
trillium-server-common = { version = "0.7.7", path = "../server-common" }

[target.'cfg(unix)'.dependencies]
signal-hook = "0.4.3"
async-signal = "0.2.13"

[dev-dependencies]
env_logger = "0.11.10"
tempfile = "3.27.0"
test-harness = "0.3.1"
trillium-client = { path = "../client" }
trillium-logger = { path = "../logger" }
trillium-testing = { path = "../testing" }

[[example]]
name = "smol"
test = true

[[example]]
name = "reuseport"
required-features = ["reuseport"]

[package.metadata.cargo-udeps.ignore]
development = ["trillium-testing", "trillium-client"]
