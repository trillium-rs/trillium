[package]
name = "trillium-webtransport"
version = "0.2.0-rc.1"
edition = "2024"
description = "WebTransport for trillium.rs"
license = "MIT OR Apache-2.0"
repository = "https://github.com/trillium-rs/trillium"
readme = "README.md"
keywords = ["trillium", "framework", "async"]
categories = ["web-programming::http-server", "web-programming"]

[dependencies]
async-channel = "2"
async-lock = "3"
log = "0.4.29"
trillium = { path = "../trillium", version = "1.0.0-rc.1" }
trillium-http = { path = "../http", version = "1.0.0-rc.1", features = [
        "unstable",
] }
swansong = "0.3"
trillium-macros = { path = "../macros", version = "0.1.0-rc.1" }
trillium-server-common = { version = "0.6.0-rc.1", path = "../server-common" }
futures-lite = "2.6.1"
trillium-logger = { version = "0.5.0-rc.1", path = "../logger" }

[dev-dependencies]
env_logger = "0.11.10"
trillium-quinn = { path = "../quinn" }
trillium-rustls = { path = "../rustls" }
trillium-smol = { path = "../smol" }
trillium-static-compiled = { path = "../static-compiled" }
trillium-testing = { path = "../testing" }

[package.metadata.cargo-udeps.ignore]
development = ["trillium-testing", "trillium-smol"]
