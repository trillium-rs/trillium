[package]
name = "trillium-websockets"
version = "0.6.6"
authors = ["Jacob Rothstein <hi@jbr.me>"]
edition = "2024"
description = "websocket support for trillium.rs"
license = "MIT OR Apache-2.0"
repository = "https://github.com/trillium-rs/trillium"
readme = "README.md"
keywords = ["trillium", "framework", "async"]
categories = ["web-programming::http-server", "web-programming"]

[package.metadata.docs.rs]
features = ["json"]

[features]
default = []
json = ["serde_json", "serde"]

[dependencies]
async-tungstenite = { version = "0.33.0", default-features = false }
base64 = "0.22.1"
fastrand = "2.3.0"
futures-lite = "2.6.1"
log = "0.4.29"
pin-project-lite = "0.2.17"
serde = { version = "1.0.228", optional = true }
serde_json = { version = "1.0.149", optional = true }
sha-1 = "0.10.1"
swansong = "0.3.3"
thiserror = "2.0.18"
trillium = { path = "../trillium", version = "0.2.20" }
trillium-http = { path = "../http", version = "0.3.17" }

[dev-dependencies]
async-tungstenite = { version = "0.33.0", default-features = false, features = ["handshake"] }
serde = { version = "1.0.228", features = ["derive"] }
async-channel = "2.5.0"
async-net = "2.0.0"
broadcaster = "1.0.0"
trillium-smol = { path = "../smol" }
trillium-testing = { path = "../testing" }
trillium-websockets = { features = ["json"], path = "." }
trillium-logger = { path = "../logger" }
env_logger = "0.11.9"

[package.metadata.cargo-udeps.ignore]
development = ["trillium-testing"]
