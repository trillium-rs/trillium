[package]
name = "trillium-testing"
version = "0.8.0"
authors = ["Jacob Rothstein <hi@jbr.me>"]
edition = "2024"
description = "testing library for trillium applications"
license = "MIT OR Apache-2.0"
repository = "https://github.com/trillium-rs/trillium"
readme = "README.md"
keywords = ["trillium", "framework", "testing"]
categories = ["web-programming::http-server", "web-programming"]

[package.metadata.docs.rs]
features = ["smol"]

[features]
tokio = ["trillium-tokio"]
smol = ["trillium-smol"]
async-std = ["trillium-async-std"]
serde_json = ["dep:serde", "dep:serde_json"]
sonic-rs = ["dep:serde", "dep:sonic-rs"]
default = ["sonic-rs"]

[dependencies]
async-dup = "1.2.4"
futures-lite = "2.6.1"
trillium = { path = "../trillium", version = "0.3.0" }
trillium-http = { path = "../http", version = "0.4.0", features = [
        "unstable",
] }
trillium-server-common = { path = "../server-common", version = "0.6.0" }
cfg-if = "1.0.4"
url = "2.5.8"
async-channel = "2.5.0"
trillium-macros = { version = "0.0.7", path = "../macros" }
dashmap = "6.1.0"
once_cell = "1.21.4"
fastrand = "2.3.0"
env_logger = "0.11.10"
log = "0.4.29"
trillium-client = { path = "../client", version = "0.7.0" }
test-harness = "0.3.1"
serde = { version = "1.0", optional = true, features = ["derive"] }
serde_json = { version = "1.0", optional = true }
fieldwork = "0.5.0"
sonic-rs = { version = "0.5.8", optional = true }

[dependencies.trillium-smol]
path = "../smol"
version = "0.5.0"
optional = true

[dependencies.trillium-tokio]
path = "../tokio"
version = "0.5.0"
optional = true

[dependencies.trillium-async-std]
path = "../async-std"
version = "0.5.0"
optional = true

[dev-dependencies]
trillium-logger = { path = "../logger" }
trillium-smol = { path = "../smol" }

[[example]]
name = "testing"
test = true
