name: docs build

on:
  push:
    branches: [main, docusaurus]
    paths: ['docs/**']
  pull_request:
    paths: ['docs/**']

jobs:
  build:
    name: build docusaurus site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: docs/package-lock.json
      - run: npm ci
        working-directory: docs
      - run: npm run build
        working-directory: docs
