[package]
name = "trillium-proxy"
version = "0.8.1"
edition = "2024"
description = "reverse proxy for trillium.rs"
license = "MIT OR Apache-2.0"
repository = "https://github.com/trillium-rs/trillium"
readme = "README.md"
keywords = ["trillium", "framework", "async"]
categories = ["web-programming::http-server", "web-programming"]

[features]
default = ["upstream-random", "upstream-connection-counting"]
upstream-random = ["dep:fastrand"]
upstream-connection-counting = ["dep:trillium-server-common", "dep:fastrand"]

[dependencies]
event-listener = "5.4.1"
fastrand = { version = "2.3.0", optional = true }
full-duplex-async-copy = "0.1.0"
futures-lite = "2.6.1"
log = "0.4.29"
size = "0.5.0"
sluice = "0.6.0"
trillium.workspace = true
trillium-client.workspace = true
trillium-forwarding.workspace = true
trillium-http = { workspace = true, features = ["unstable"] }
trillium-server-common = { workspace = true, optional = true }
url = "2.5.8"

[dev-dependencies]
env_logger = "0.11.10"
querystrong = { version = "0.4.0", features = ["serde"] }
trillium-api = { path = "../api" }
trillium-http = { path = "../http", features = ["serde"] }
trillium-logger = { path = "../logger" }
trillium-smol = { path = "../smol" }
