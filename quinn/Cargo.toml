[package]
name = "trillium-quinn"
version = "0.1.2"
edition = "2024"
description = "quinn QUIC adapter for trillium.rs HTTP/3 support"
license = "MIT OR Apache-2.0"
repository = "https://github.com/trillium-rs/trillium"
keywords = ["trillium", "framework", "async", "quic", "h3"]
categories = ["web-programming::http-server", "web-programming"]
readme = "README.md"

[features]
default = ["aws-lc-rs"]
aws-lc-rs = ["quinn/rustls-aws-lc-rs", "rustls/aws-lc-rs"]
ring = ["quinn/rustls-ring", "rustls/ring"]
custom-crypto-provider = ["quinn/rustls"]
webpki-roots = ["dep:webpki-roots"]

[lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = ["cfg(quinn_testing)"] }

[dependencies]
async-compat = "0.2"
futures-lite = "2"
log = "0.4"
quinn = { version = "0.11", default-features = false, features = ["log"] }
rustls = { version = "0.23", default-features = false }
rustls-pemfile = "2"
webpki-roots = { version = "1.0", optional = true }
trillium-macros.workspace = true
trillium-server-common.workspace = true


[dev-dependencies]
async-channel = "2.5.0"
env_logger = "0.11.10"
h3i = "0.6.0"
rcgen = "0.14.7"
trillium.workspace = true
trillium-client.workspace = true
trillium-logger.workspace = true
trillium-rustls.workspace = true
trillium-testing.workspace = true
trillium-tokio.workspace = true

[package.metadata.cargo-udeps.ignore]
development = ["h3i", "rcgen", "trillium-testing"]
