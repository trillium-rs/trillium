[package]
name = "trillium-tokio"
version = "0.5.0-rc.2"
authors = ["Jacob Rothstein <hi@jbr.me>"]
edition = "2024"
description = "tokio runtime adapter for trillium.rs"
license = "MIT OR Apache-2.0"
repository = "https://github.com/trillium-rs/trillium"
readme = "README.md"
keywords = ["trillium", "framework", "async"]
categories = ["web-programming::http-server", "web-programming"]

[dependencies]
async-compat = "0.2.5"
log = "0.4.29"
tokio-stream = { version = "0.1.18", features = ["net"] }
trillium = { path = "../trillium", version = "1.0.0-rc.2" }
trillium-http = { path = "../http", version = "1.0.0-rc.2" }
trillium-macros = { version = "0.1.0-rc.1", path = "../macros" }
trillium-server-common = { path = "../server-common", version = "0.6.0-rc.2" }

[dependencies.tokio]
version = "1.50.0"
features = ["rt", "net", "fs", "rt-multi-thread", "time"]

[target.'cfg(unix)'.dependencies]
signal-hook = "0.4.3"
signal-hook-tokio = { version = "0.4.0", features = ["futures-v0_3"] }

[dev-dependencies]
env_logger = "0.11.10"
tokio = { version = "1.50.0", features = ["full"] }
